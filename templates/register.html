<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luo tunnus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=dark-fitness-26">
</head>
<body>
    <main class="container auth-page">
        <section class="auth-hero">
            <p class="eyebrow">Aamupainosovellus</p>
            <h1>Weight Tracker</h1>
            <p class="intro">Luo oma tunnus ja pidä aamupainomerkinnät erillään muista käyttäjistä.</p>
        </section>

        <section class="panel auth-card">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">Get started</p>
                    <h2>Luo tunnus</h2>
                </div>
            </div>

            {% for category, message in get_flashed_messages(with_categories=True) %}
                <p class="message {{ category }}">{{ message }}</p>
            {% endfor %}

            <form method="post" action="{{ url_for('register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <label for="username">Käyttäjänimi</label>
                <input type="text" id="username" name="username" minlength="3" maxlength="30" pattern="[A-Za-z0-9_]+" required>

                <label for="password">Salasana</label>
                <input type="password" id="password" name="password" minlength="4" required>

                <label for="password_confirm">Salasana uudelleen</label>
                <input type="password" id="password_confirm" name="password_confirm" minlength="4" required>

                <button type="submit">Luo tunnus</button>
            </form>

            <p class="auth-link">
                Onko sinulla jo tunnus?
                <a href="{{ url_for('login') }}">Kirjaudu sisään</a>
            </p>
        </section>
    </main>
</body>
</html>
