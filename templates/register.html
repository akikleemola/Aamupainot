<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luo tunnus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <h1>Luo tunnus</h1>
        <p class="intro">Tunnuksen avulla jokainen käyttäjä näkee omat painomerkintänsä.</p>

        {% for message in get_flashed_messages() %}
            <p class="message">{{ message }}</p>
        {% endfor %}

        <section class="panel">
            <form method="post" action="{{ url_for('register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <label for="username">Käyttäjänimi</label>
                <input type="text" id="username" name="username" minlength="3" maxlength="30" pattern="[A-Za-z0-9_]+" required>

                <label for="password">Salasana</label>
                <input type="password" id="password" name="password" required>

                <label for="password_confirm">Salasana uudelleen</label>
                <input type="password" id="password_confirm" name="password_confirm" required>

                <button type="submit">Luo tunnus</button>
            </form>
        </section>

        <p class="auth-link">
            Onko sinulla jo tunnus?
            <a href="{{ url_for('login') }}">Kirjaudu sisään</a>
        </p>
    </main>
</body>
</html>
