<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirjaudu sisään</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=dark-fitness-26">
</head>
<body>
    <main class="container auth-page">
        <section class="auth-hero">
            <p class="eyebrow">Aamupainosovellus</p>
            <h1>Weight Tracker</h1>
            <p class="intro">Kirjaudu sisään ja jatka aamupainon trendin seuraamista.</p>
        </section>

        <section class="panel auth-card">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">Welcome back</p>
                    <h2>Kirjaudu sisään</h2>
                </div>
            </div>

            {% for category, message in get_flashed_messages(with_categories=True) %}
                <p class="message {{ category }}">{{ message }}</p>
            {% endfor %}

            <form method="post" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <label for="username">Käyttäjänimi</label>
                <input type="text" id="username" name="username" maxlength="30" required>

                <label for="password">Salasana</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Kirjaudu sisään</button>
            </form>

            <p class="auth-link">
                Ei tunnusta vielä?
                <a href="{{ url_for('register') }}">Luo tunnus</a>
            </p>
        </section>
    </main>
</body>
</html>
